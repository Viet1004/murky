<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --cream: #faf7f2;
      --cream-dark: #f5efe6;
      --brand: #f1641e;
      --brand-600: #d4541a;
      --brand-700: #a13e10;
      --brand-50: #fff7f2;
      --ink: #222222;
      --ink-muted: #5e5e5e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--cream);
      color: var(--ink);
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 span.logo { font-size: 18px; }

    /* Toggle switch */
    .switch { position: relative; width: 38px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #d6cfc3;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: ""; position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    input:checked + .slider { background: var(--brand); }
    input:checked + .slider::before { transform: translateX(16px); }

    /* Status card */
    .card {
      background: #fff;
      border: 1px solid var(--cream-dark);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #c9c1b3;
      flex-shrink: 0;
    }
    .dot.connected { background: #2f9e44; }
    .dot.local { background: var(--brand); }
    .meta {
      margin-top: 6px;
      font-size: 11px;
      color: var(--ink-muted);
      line-height: 1.4;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--cream-dark);
      background: #fff;
      color: var(--ink);
      transition: background .15s, border-color .15s;
    }
    .btn:hover { border-color: var(--brand); }
    .btn-primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    .btn-primary:hover { background: var(--brand-600); border-color: var(--brand-600); }
    .btn + .btn,
    .btn + #signedIn { margin-top: 6px; }

    #signedIn { margin-top: 10px; }

    .row {
      display: flex;
      gap: 6px;
    }
    .row .btn { flex: 1; margin-top: 0; }

    .email {
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 8px;
      text-align: center;
      word-break: break-all;
    }

    /* Footer (server url) */
    footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--cream-dark);
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    input.server {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid var(--cream-dark);
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }
    input.server:focus { border-color: var(--brand); }
  </style>
</head>
<body>
  <header>
    <h1><span class="logo">🎭</span> Murky</h1>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </header>

  <div class="card">
    <div class="status-row">
      <span class="dot" id="statusDot"></span>
      <span id="statusLabel">Checking…</span>
    </div>
    <div class="meta" id="statusMeta"></div>
  </div>

  <button class="btn btn-primary" id="browseBtn">Browse collections</button>

  <div id="signedIn" style="display:none;">
    <div class="email" id="userEmail"></div>
    <div class="row">
      <button class="btn" id="studioBtn">Open Studio</button>
      <button class="btn" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <footer>
    <div class="field-label">Server</div>
    <input type="text" id="serverUrlInput" class="server" placeholder="http://localhost:8000" />
  </footer>

  <script src="dist/popup.js"></script>
</body>
</html>
